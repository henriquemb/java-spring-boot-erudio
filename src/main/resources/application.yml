spring:
  application:
    name: java-spring-boot-erudio
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    #Por ser ambiente de estudo não irei usar variável de ambiente :D
    url: jdbc:mariadb://localhost:3306/spring_boot_erudio?useTimezone=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
    show-sql: true